<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomuPa! Check - 制作者用</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --homupa-orange: #FF6B35;
            --homupa-navy: #1E3A5F;
            --homupa-green: #10B981;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        .sidebar {
            width: 350px;
            min-width: 350px;
            max-height: calc(100vh - 64px);
            overflow-y: auto;
        }

        .main-canvas {
            flex: 1;
            overflow-y: auto;
            background: #f5f5f5;
        }

        .pin-marker {
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }

        .pin-marker:hover {
            transform: scale(1.2);
            z-index: 20;
        }

        .comment-item:hover {
            background-color: #FFF4ED;
        }

        .comment-item.active {
            background-color: #FFE4D6;
            border-left: 4px solid #ff3a56;
        }

        .page-tab {
            transition: all 0.2s;
        }

        .page-tab.active {
            background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out;
        }

        .modal-backdrop {
            backdrop-filter: blur(4px);
        }

        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .screenshot-container {
            position: relative;
            display: inline-block;
        }

        .screenshot-container img {
            display: block;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- モーダル: ページ追加 -->
    <div id="addPageModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" style="background-color: rgba(0,0,0,0.5);">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full p-6 animate-fadeIn">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold" style="color: var(--homupa-navy);">
                    ページを追加
                </h3>
                <button onclick="closeAddPageModal()" class="text-gray-400 hover:text-gray-600 text-2xl">
                    &times;
                </button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: var(--homupa-navy);">
                        ページ名
                    </label>
                    <input 
                        type="text" 
                        id="newPageName" 
                        placeholder="例: トップページ、会社概要"
                        class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-orange-500 focus:outline-none"
                    >
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: var(--homupa-navy);">
                        デバイス
                    </label>
                    <div class="flex gap-3">
                        <label class="flex items-center gap-2 flex-1 p-3 border-2 border-gray-300 rounded-lg cursor-pointer hover:border-orange-300">
                            <input type="radio" name="deviceMode" value="desktop" checked class="text-orange-500">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                <line x1="8" y1="21" x2="16" y2="21"></line>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                            <span class="font-medium text-sm">PC版</span>
                        </label>
                        <label class="flex items-center gap-2 flex-1 p-3 border-2 border-gray-300 rounded-lg cursor-pointer hover:border-orange-300">
                            <input type="radio" name="deviceMode" value="mobile" class="text-orange-500">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                                <line x1="12" y1="18" x2="12.01" y2="18"></line>
                            </svg>
                            <span class="font-medium text-sm">スマホ版</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: var(--homupa-navy);">
                        スクリーンショット画像
                    </label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-orange-300 transition cursor-pointer" onclick="document.getElementById('screenshotUpload').click()">
                        <input 
                            type="file" 
                            id="screenshotUpload" 
                            accept="image/*"
                            class="hidden"
                            onchange="handleFileSelect(event)"
                        >
                        <svg class="mx-auto mb-2 text-gray-400" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <p class="text-sm text-gray-600" id="uploadText">クリックして画像を選択</p>
                        <p class="text-xs text-gray-400 mt-1">PNG, JPG, WEBP対応</p>
                    </div>
                    <div id="imagePreview" class="mt-3 hidden">
                        <img id="previewImg" class="w-full rounded-lg border-2 border-gray-200" style="max-height: 200px; object-fit: contain;">
                    </div>
                </div>

                <button 
                    onclick="addNewPage()" 
                    id="addPageBtn"
                    class="w-full text-white px-6 py-3 rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50 disabled:cursor-not-allowed"
                    style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);"
                    disabled
                >
                    ページを追加
                </button>
            </div>
        </div>
    </div>

    <!-- モーダル: コメント入力 -->
    <div id="commentModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" style="background-color: rgba(0,0,0,0.5);">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 animate-fadeIn">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold" style="color: var(--homupa-navy);">
                    修正内容を入力
                </h3>
                <button onclick="closeCommentModal()" class="text-gray-400 hover:text-gray-600 text-2xl">
                    &times;
                </button>
            </div>

            <textarea 
                id="commentInput" 
                placeholder="例: このボタンの色を青色に変更してください"
                class="w-full h-32 px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-orange-500 focus:outline-none resize-none text-gray-700 mb-4"
            ></textarea>

            <div class="flex gap-3">
                <button 
                    onclick="closeCommentModal()" 
                    class="flex-1 px-4 py-3 border-2 border-gray-300 text-gray-700 rounded-lg font-semibold hover:bg-gray-50 transition"
                >
                    キャンセル
                </button>
                <button 
                    onclick="saveComment()" 
                    class="flex-1 px-4 py-3 text-white rounded-lg font-semibold hover:opacity-90 transition"
                    style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);"
                >
                    保存
                </button>
            </div>
        </div>
    </div>

    <!-- モーダル: 共有URL -->
    <div id="shareModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop" style="background-color: rgba(0,0,0,0.5);">
        <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full p-8 animate-fadeIn">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-2xl font-bold" style="color: var(--homupa-navy);">
                    クライアント共有URL
                </h3>
                <button onclick="closeShareModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">
                    &times;
                </button>
            </div>

            <div class="mb-6">
                <p class="text-sm font-semibold mb-2" style="color: var(--homupa-navy);">
                    クライアント用URL（修正指示入力）
                </p>
                <div class="flex gap-2 mb-4">
                    <input 
                        type="text" 
                        id="shareUrl" 
                        readonly
                        class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg bg-gray-50 text-sm font-mono"
                    >
                    <button 
                        onclick="copyShareUrl()" 
                        class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg font-semibold hover:bg-gray-300 transition"
                    >
                        コピー
                    </button>
                </div>
                <button 
                    onclick="openClientPage()" 
                    class="w-full text-white px-6 py-4 rounded-lg font-bold hover:opacity-90 transition text-lg"
                    style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);"
                >
                    <svg class="inline-block mr-2" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                        <line x1="12" y1="18" x2="12.01" y2="18"></line>
                    </svg>
                    クライアント画面をプレビュー
                </button>
            </div>

            <div class="border-t pt-6">
                <p class="text-sm font-semibold mb-4" style="color: var(--homupa-navy);">
                    📋 使い方
                </p>
                <ol class="space-y-2 text-sm text-gray-600">
                    <li>1. 上記URLをクライアントに送信</li>
                    <li>2. クライアントが修正指示を入力</li>
                    <li>3. クライアントが送信すると、対応者用URLがLINEに通知されます</li>
                </ol>
            </div>

            <button 
                onclick="closeShareModal()" 
                class="w-full mt-6 px-6 py-3 text-white rounded-lg font-bold hover:opacity-90 transition"
                style="background-color: var(--homupa-navy);"
            >
                閉じる
            </button>
        </div>
    </div>

    <!-- ヘッダー -->
    <header class="bg-white shadow-md border-b border-gray-200 sticky top-0 z-30">
        <div class="px-6 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl md:text-2xl font-bold" style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                        HomuPa! Check
                    </h1>
                    <span class="text-xs md:text-sm text-white px-3 py-1 rounded-full" style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);">
                        制作者用
                    </span>
                </div>

                <div class="flex items-center gap-3">
                    <button 
                        onclick="openAddPageModal()" 
                        class="flex items-center gap-2 px-4 py-2 text-white rounded-lg font-semibold hover:opacity-90 transition"
                        style="background-color: #000000;"
                    >
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span class="hidden sm:inline">ページ追加</span>
                    </button>

                    <button 
                        onclick="generateShareUrl()" 
                        class="flex items-center gap-2 px-4 py-2 text-white rounded-lg font-semibold hover:opacity-90 transition"
                        style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);"
                    >
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3"></circle>
                            <circle cx="6" cy="12" r="3"></circle>
                            <circle cx="18" cy="19" r="3"></circle>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                        </svg>
                        <span class="hidden sm:inline">共有URL作成</span>
                    </button>

                    <div class="hidden md:flex items-center gap-2 px-4 py-2 rounded-lg" style="background-color: white; border: 2px solid #000000;">
                        <span class="text-sm font-semibold" style="color: #000000;">修正指示:</span>
                        <span class="text-sm font-bold" style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;" id="totalComments">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="flex" style="height: calc(100vh - 72px);">
        <!-- サイドバー -->
        <aside class="sidebar bg-white border-r border-gray-200">
            <div class="p-4">
                <!-- ページタブ -->
                <div class="mb-6">
                    <h3 class="text-sm font-bold mb-3" style="color: var(--homupa-navy);">
                        📄 ページ一覧
                    </h3>
                    <div id="pageTabs" class="space-y-2">
                        <div class="text-center py-8 text-gray-400 text-sm">
                            ページを追加してください
                        </div>
                    </div>
                </div>

                <!-- コメントリスト -->
                <div>
                    <h3 class="text-sm font-bold mb-3" style="color: var(--homupa-navy);">
                        💬 修正指示一覧
                    </h3>
                    <div id="commentList">
                        <div class="p-8 text-center text-gray-400">
                            <svg class="mx-auto mb-3 text-gray-300" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <p class="text-sm">修正指示がありません</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- メインキャンバス -->
        <main class="main-canvas p-8">
            <div id="canvasArea">
                <div class="bg-white rounded-2xl shadow-xl p-6">
                    <div id="screenshotDisplay" class="text-center py-20 text-gray-400">
                        <svg class="mx-auto mb-4 text-gray-300" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p>ページを追加してスクリーンショットを表示</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        // Firebase設定
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, get, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCa1XgQubPOwZxhGSTYVkFHq9yjInCYAec",
            authDomain: "homupa-check.firebaseapp.com",
            databaseURL: "https://homupa-check-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "homupa-check",
            storageBucket: "homupa-check.firebasestorage.app",
            messagingSenderId: "190974280049",
            appId: "1:190974280049:web:c5dcb3111a70d5cc32f6d0"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        console.log('✅ HomuPa! Check - 制作者画面起動 (Firebase対応)');

        // グローバル変数
        let pages = [];
        let currentPageId = null;
        let pendingPinPosition = null;
        let uploadedImageData = null;
        let projectId = null;

        // 関数をグローバルスコープに公開
        window.openAddPageModal = openAddPageModal;
        window.closeAddPageModal = closeAddPageModal;
        window.addNewPage = addNewPage;
        window.handleFileSelect = handleFileSelect;
        window.switchPage = switchPage;
        window.deletePage = deletePage;
        window.handleScreenshotClick = handleScreenshotClick;
        window.closeCommentModal = closeCommentModal;
        window.saveComment = saveComment;
        window.highlightPin = highlightPin;
        window.deleteComment = deleteComment;
        window.generateShareUrl = generateShareUrl;
        window.closeShareModal = closeShareModal;
        window.copyShareUrl = copyShareUrl;
        window.openClientPage = openClientPage;

        // プロジェクトIDを生成または取得
        function initializeProject() {
            const urlParams = new URLSearchParams(window.location.search);
            const existingId = urlParams.get('project');
            
            if (existingId) {
                projectId = existingId;
                loadProjectFromFirebase();
            } else {
                projectId = 'project_' + Math.random().toString(36).substr(2, 9);
                updateURLWithProjectId();
            }
        }

        function updateURLWithProjectId() {
            const newUrl = window.location.pathname + '?project=' + projectId;
            window.history.replaceState({}, '', newUrl);
        }

        // Firebaseに保存
        async function autoSave() {
            if (!projectId || pages.length === 0) return;

            const data = {
                pages: pages,
                projectId: projectId,
                updatedAt: new Date().toISOString()
            };
            
            try {
                await set(ref(database, 'projects/' + projectId), data);
                console.log('💾 Firebase保存完了');
            } catch (e) {
                console.error('❌ Firebase保存エラー:', e);
                alert('データの保存に失敗しました: ' + e.message);
            }
        }

        // Firebaseから読み込み
        async function loadProjectFromFirebase() {
            try {
                const snapshot = await get(ref(database, 'projects/' + projectId));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    pages = data.pages || [];
                    if (pages.length > 0) {
                        currentPageId = pages[0].id;
                        renderPageTabs();
                        renderScreenshot();
                        renderCommentList();
                        updateTotalComments();
                    }
                    console.log('✅ Firebaseからデータ読み込み完了');
                }
            } catch (e) {
                console.error('❌ Firebase読み込みエラー:', e);
            }
        }

        // UUID生成
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // ファイル選択処理
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('画像ファイルを選択してください');
                return;
            }

            // 画像を圧縮して読み込み
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // キャンバスで画像を圧縮
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    // 最大幅を800pxに削減（より軽量化）
                    const maxWidth = 800;
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 圧縮率を0.5に変更（50%品質でさらに軽量化）
                    uploadedImageData = canvas.toDataURL('image/jpeg', 0.5);
                    
                    // プレビュー表示
                    document.getElementById('previewImg').src = uploadedImageData;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('uploadText').textContent = file.name + ' (圧縮済み)';
                    document.getElementById('addPageBtn').disabled = false;
                    
                    console.log('✅ 画像圧縮完了');
                    console.log('元のサイズ:', (e.target.result.length / 1024).toFixed(2), 'KB');
                    console.log('圧縮後:', (uploadedImageData.length / 1024).toFixed(2), 'KB');
                    console.log('圧縮率:', ((uploadedImageData.length / e.target.result.length) * 100).toFixed(1), '%');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ページ追加モーダル
        function openAddPageModal() {
            const modal = document.getElementById('addPageModal');
            modal.style.display = 'flex';
            modal.classList.add('show');
            
            uploadedImageData = null;
            document.getElementById('newPageName').value = '';
            document.getElementById('screenshotUpload').value = '';
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('uploadText').textContent = 'クリックして画像を選択';
            document.getElementById('addPageBtn').disabled = true;
            document.querySelector('input[name="deviceMode"][value="desktop"]').checked = true;
        }

        function closeAddPageModal() {
            const modal = document.getElementById('addPageModal');
            modal.style.display = 'none';
            modal.classList.remove('show');
        }

        // ページ追加
        function addNewPage() {
            const name = document.getElementById('newPageName').value.trim();
            const mode = document.querySelector('input[name="deviceMode"]:checked').value;

            if (!uploadedImageData) {
                alert('画像を選択してください');
                return;
            }

            const newPage = {
                id: generateUUID(),
                name: name || `ページ ${pages.length + 1}`,
                mode: mode,
                screenshot: uploadedImageData,
                comments: []
            };

            pages.push(newPage);
            currentPageId = newPage.id;

            closeAddPageModal();
            renderPageTabs();
            renderScreenshot();
            renderCommentList();
            updateTotalComments();
            autoSave();
        }

        // ページタブレンダリング
        function renderPageTabs() {
            const container = document.getElementById('pageTabs');
            
            if (pages.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-400 text-sm">
                        ページを追加してください
                    </div>
                `;
                return;
            }

            container.innerHTML = pages.map(page => `
                <div class="flex items-center gap-2">
                    <button 
                        onclick="switchPage('${page.id}')"
                        class="page-tab flex-1 text-left p-3 rounded-lg ${page.id === currentPageId ? 'active' : 'bg-gray-50 hover:bg-gray-100'}"
                    >
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-semibold text-sm truncate flex-1">
                                ${page.name}
                            </span>
                            <span class="text-xs px-2 py-1 rounded ${page.id === currentPageId ? 'bg-white bg-opacity-30' : 'bg-blue-100 text-blue-700'}">
                                ${page.mode === 'desktop' ? '💻 PC' : '📱 スマホ'}
                            </span>
                        </div>
                        <div class="flex items-center gap-2 text-xs ${page.id === currentPageId ? 'text-white opacity-80' : 'text-gray-500'}">
                            <span>${page.comments.length} 件の修正指示</span>
                        </div>
                    </button>
                    <button 
                        onclick="deletePage('${page.id}')"
                        class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition"
                        title="削除"
                    >
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        // ページ削除
        function deletePage(pageId) {
            if (!confirm('このページを削除しますか？')) return;
            
            pages = pages.filter(p => p.id !== pageId);
            
            if (currentPageId === pageId) {
                currentPageId = pages.length > 0 ? pages[0].id : null;
            }
            
            renderPageTabs();
            renderScreenshot();
            renderCommentList();
            updateTotalComments();
            autoSave();
        }

        // ページ切り替え
        function switchPage(pageId) {
            currentPageId = pageId;
            renderPageTabs();
            renderScreenshot();
            renderCommentList();
        }

        // スクリーンショット表示
        function renderScreenshot() {
            const page = pages.find(p => p.id === currentPageId);
            const container = document.getElementById('screenshotDisplay');

            if (!page) {
                container.innerHTML = `
                    <div class="text-center py-20 text-gray-400">
                        <svg class="mx-auto mb-4 text-gray-300" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p>ページを追加してスクリーンショットを表示</p>
                    </div>
                `;
                return;
            }

            const maxWidth = page.mode === 'desktop' ? '1200px' : '400px';
            
            container.innerHTML = `
                <div style="position: relative; display: inline-block; max-width: ${maxWidth}; margin: 0 auto;">
                    <img 
                        id="mainScreenshot"
                        src="${page.screenshot}" 
                        alt="${page.name}"
                        onclick="handleScreenshotClick(event)"
                        style="width: 100%; display: block; border: 2px solid #ddd; border-radius: 8px; cursor: crosshair;"
                    >
                    <div id="pinsContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
                </div>
            `;

            const img = document.getElementById('mainScreenshot');
            if (img.complete) {
                renderPins();
            } else {
                img.onload = () => renderPins();
            }
        }

        // スクリーンショットクリック
        function handleScreenshotClick(event) {
            const rect = event.target.getBoundingClientRect();
            const x = ((event.clientX - rect.left) / rect.width) * 100;
            const y = ((event.clientY - rect.top) / rect.height) * 100;

            pendingPinPosition = { x, y };
            const modal = document.getElementById('commentModal');
            modal.style.display = 'flex';
            modal.classList.add('show');
        }

        // コメントモーダル
        function closeCommentModal() {
            const modal = document.getElementById('commentModal');
            modal.style.display = 'none';
            modal.classList.remove('show');
            document.getElementById('commentInput').value = '';
            pendingPinPosition = null;
        }

        function saveComment() {
            const comment = document.getElementById('commentInput').value.trim();

            if (!comment) {
                alert('修正内容を入力してください');
                return;
            }

            if (pendingPinPosition && currentPageId) {
                const page = pages.find(p => p.id === currentPageId);
                
                if (page) {
                    page.comments.push({
                        id: generateUUID(),
                        x: pendingPinPosition.x,
                        y: pendingPinPosition.y,
                        comment: comment,
                        completed: false,
                        createdAt: new Date().toISOString()
                    });
                    
                    renderPageTabs();
                    renderCommentList();
                    renderPins();
                    updateTotalComments();
                    closeCommentModal();
                    autoSave();
                }
            }
        }

        // コメントリスト表示
        function renderCommentList() {
            const container = document.getElementById('commentList');
            const page = pages.find(p => p.id === currentPageId);

            if (!page || page.comments.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-gray-400">
                        <svg class="mx-auto mb-3 text-gray-300" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p class="text-sm">このページには修正指示がありません</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = page.comments.map((comment, index) => `
                <div class="comment-item p-4 cursor-pointer mb-2 rounded-lg" onclick="highlightPin('${comment.id}')">
                    <div class="flex items-start gap-3">
                        <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);">
                            ${index + 1}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm text-gray-800 leading-relaxed mb-2">
                                ${comment.comment}
                            </p>
                            <div class="flex items-center gap-3 text-xs text-gray-500">
                                <span>位置: ${comment.x.toFixed(1)}%, ${comment.y.toFixed(1)}%</span>
                            </div>
                        </div>
                        <button 
                            onclick="event.stopPropagation(); deleteComment('${comment.id}')"
                            class="flex-shrink-0 text-gray-400 hover:text-red-500 transition"
                        >
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ピン表示
        function renderPins() {
            const container = document.getElementById('pinsContainer');
            const page = pages.find(p => p.id === currentPageId);

            if (!container) return;
            container.innerHTML = '';
            if (!page) return;

            page.comments.forEach((comment, index) => {
                const pinElement = document.createElement('div');
                pinElement.id = `pin-${comment.id}`;
                pinElement.className = 'pin-marker absolute transform -translate-x-1/2 -translate-y-full pointer-events-auto';
                pinElement.style.left = comment.x + '%';
                pinElement.style.top = comment.y + '%';

                pinElement.innerHTML = `
                    <div class="relative">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="#ff3a56" stroke="#ff3a56" stroke-width="2" class="drop-shadow-lg">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3" fill="white"></circle>
                        </svg>
                        <div class="absolute top-1 left-1/2 transform -translate-x-1/2 text-white text-xs font-bold">
                            ${index + 1}
                        </div>
                    </div>
                `;

                pinElement.onclick = () => highlightPin(comment.id);
                container.appendChild(pinElement);
            });
        }

        function highlightPin(commentId) {
            document.querySelectorAll('.pin-marker').forEach(pin => {
                pin.style.transform = 'translateX(-50%) translateY(-100%)';
            });

            document.querySelectorAll('.comment-item').forEach(item => {
                item.classList.remove('active');
            });

            const pinElement = document.getElementById(`pin-${commentId}`);
            if (pinElement) {
                pinElement.style.transform = 'translateX(-50%) translateY(-100%) scale(1.3)';
                pinElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            const page = pages.find(p => p.id === currentPageId);
            if (page) {
                const commentIndex = page.comments.findIndex(c => c.id === commentId);
                if (commentIndex !== -1) {
                    const commentItems = document.querySelectorAll('.comment-item');
                    if (commentItems[commentIndex]) {
                        commentItems[commentIndex].classList.add('active');
                        commentItems[commentIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }
            }
        }

        function deleteComment(commentId) {
            if (!confirm('この修正指示を削除しますか?')) return;

            const page = pages.find(p => p.id === currentPageId);
            if (page) {
                page.comments = page.comments.filter(c => c.id !== commentId);
                renderPageTabs();
                renderCommentList();
                renderPins();
                updateTotalComments();
                autoSave();
            }
        }

        function updateTotalComments() {
            const total = pages.reduce((sum, page) => sum + page.comments.length, 0);
            document.getElementById('totalComments').textContent = total;
        }

        // 共有URL生成
        function generateShareUrl() {
            console.log('✅ 共有URL作成ボタンがクリックされました');
            console.log('ページ数:', pages.length);
            
            if (pages.length === 0) {
                alert('共有するページがありません。まずページを追加してください。');
                return;
            }

            autoSave();

            // URLを生成
            let shareUrl;
            const currentUrl = window.location.href;
            
            console.log('現在のURL:', currentUrl);
            
            if (currentUrl.includes('homupa-feedback-creator.html')) {
                // 正常なファイルパス
                shareUrl = currentUrl.split('?')[0].replace('homupa-feedback-creator.html', 'homupa-feedback-client.html') + '?project=' + projectId;
            } else if (currentUrl.includes('about:') || currentUrl.includes('srcdoc')) {
                // iframe等で開かれている場合の警告
                alert('⚠️ このページは直接ファイルとして開いてください。\n\nファイルエクスプローラーから homupa-feedback-creator.html をブラウザにドラッグ&ドロップして開いてください。');
                return;
            } else {
                // その他の場合
                const path = window.location.pathname;
                const dir = path.substring(0, path.lastIndexOf('/'));
                shareUrl = window.location.origin + dir + '/homupa-feedback-client.html?project=' + projectId;
            }
            
            document.getElementById('shareUrl').value = shareUrl;
            
            const modal = document.getElementById('shareModal');
            modal.style.display = 'flex';
            modal.classList.add('show');
            
            console.log('=== 共有URL生成 ===');
            console.log('プロジェクトID:', projectId);
            console.log('生成されたURL:', shareUrl);
            console.log('モーダル表示:', modal.style.display);
        }

        function closeShareModal() {
            const modal = document.getElementById('shareModal');
            modal.style.display = 'none';
            modal.classList.remove('show');
        }

        async function copyShareUrl() {
            const input = document.getElementById('shareUrl');
            const url = input.value;
            
            try {
                await navigator.clipboard.writeText(url);
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'コピー完了！';
                btn.style.backgroundColor = '#10B981';
                btn.style.color = 'white';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.backgroundColor = '';
                    btn.style.color = '';
                }, 2000);
            } catch (err) {
                input.select();
                document.execCommand('copy');
                alert('URLをコピーしました！');
            }
        }

        function openClientPage() {
            const shareUrl = document.getElementById('shareUrl').value;
            if (shareUrl) {
                window.open(shareUrl, '_blank');
            }
        }

        // 初期化
        initializeProject();
        updateTotalComments();
        
        // Storage使用状況確認（Firebase版では不要だが互換性のため残す）
        function checkStorageUsage() {
            console.log('📊 Firebase使用中 - LocalStorage制限なし');
        }
        
        checkStorageUsage();
    </script>

</body>
</html>
