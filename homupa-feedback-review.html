<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomuPa! Check - 修正対応画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --homupa-orange: #FF6B35;
            --homupa-navy: #1E3A5F;
            --homupa-green: #10B981;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        .sidebar {
            width: 380px;
            min-width: 380px;
            max-height: calc(100vh - 160px);
            overflow-y: auto;
        }

        .main-canvas {
            flex: 1;
            overflow-y: auto;
            background: #f5f5f5;
        }

        .pin-marker {
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }

        .pin-marker:hover {
            transform: scale(1.2);
            z-index: 20;
        }

        .pin-marker.completed {
            opacity: 0.4;
        }

        .comment-item {
            transition: all 0.2s;
        }

        .comment-item:hover {
            background-color: #FFF4ED;
        }

        .comment-item.active {
            background-color: #FFE4D6;
            border-left: 4px solid #ff3a56(135deg, #ff3a56 0%, #0daeec 100%);
        }

        .comment-item.completed {
            opacity: 0.6;
            background-color: #f0fdf4;
        }

        .page-tab {
            transition: all 0.2s;
        }

        .page-tab.active {
            background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);
            color: white;
        }

        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .checkbox-custom {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .checkbox-custom:checked {
            background-color: var(--homupa-green);
            border-color: var(--homupa-green);
        }

        .checkbox-custom:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .tooltip {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 30;
        }

        .pin-marker:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .progress-bar {
            transition: width 0.3s ease;
        }

        .screenshot-container {
            position: relative;
            display: inline-block;
        }

        .screenshot-container img {
            display: block;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- ヘッダー -->
    <header class="bg-white shadow-md border-b border-gray-200 sticky top-0 z-30">
        <div class="px-6 py-4">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="flex items-center gap-4">
                    <h1 class="text-xl md:text-2xl font-bold" style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                        HomuPa! Check
                    </h1>
                    <span class="text-xs md:text-sm text-white px-3 py-1 rounded-full" style="background: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);">
                        修正対応画面
                    </span>
                </div>

                <div class="flex items-center gap-3">
                    <div class="hidden md:flex items-center gap-2 px-4 py-2 rounded-lg" style="background-color: white; border: 2px solid #000000;">
                        <span class="text-sm font-semibold" style="color: #000000;">進捗:</span>
                        <span class="text-sm font-bold" style="color: linear-gradient(135deg, #ff3a56 0%, #0daeec 100%);" id="progressText">0/0</span>
                    </div>
                </div>
            </div>

            <!-- プログレスバー -->
            <div class="mt-4">
                <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                    <div 
                        id="progressBar" 
                        class="progress-bar h-full rounded-full transition-all"
                        style="width: 0%; background-color: var(--homupa-green);"
                    ></div>
                </div>
            </div>

            <!-- 情報バー -->
            <div class="mt-4 rounded-lg p-3" style="background-color: #E8F5E9; border: 1px solid #A5D6A7;">
                <div class="flex items-center justify-between">
                    <p class="text-sm" style="color: #2E7D32;">
                        <strong id="totalComments">0</strong> 件の修正指示があります
                    </p>
                    <div class="flex gap-2">
                        <button 
                            onclick="filterComments('all')" 
                            id="btnAll"
                            class="text-xs px-3 py-1 rounded font-semibold"
                            style="background-color: #C8E6C9; color: #2E7D32;"
                        >
                            全て
                        </button>
                        <button 
                            onclick="filterComments('pending')" 
                            id="btnPending"
                            class="text-xs px-3 py-1 rounded font-semibold"
                            style="background-color: white; border: 2px solid #000; color: #000;"
                        >
                            未対応
                        </button>
                        <button 
                            onclick="filterComments('completed')" 
                            id="btnCompleted"
                            class="text-xs px-3 py-1 rounded font-semibold"
                            style="background-color: white; border: 2px solid #000; color: #000;"
                        >
                            完了
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="flex" style="height: calc(100vh - 200px);">
        <!-- サイドバー -->
        <aside class="sidebar bg-white border-r border-gray-200">
            <div class="p-4">
                <!-- ページタブ -->
                <div class="mb-6">
                    <h3 class="text-sm font-bold mb-3" style="color: var(--homupa-navy);">
                        📄 ページ一覧
                    </h3>
                    <div id="pageTabs"></div>
                </div>

                <!-- コメントリスト -->
                <div>
                    <h3 class="text-sm font-bold mb-3" style="color: var(--homupa-navy);">
                        ✅ 修正チェックリスト
                    </h3>
                    <div id="commentList"></div>
                </div>
            </div>
        </aside>

        <!-- メインキャンバス -->
        <main class="main-canvas p-8">
            <div id="canvasArea">
                <div class="bg-white rounded-2xl shadow-xl p-6">
                    <div id="screenshotDisplay"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        // Firebase設定
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, get, update } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCa1XgQubPOwZxhGSTYVkFHq9yjInCYAec",
            authDomain: "homupa-check.firebaseapp.com",
            databaseURL: "https://homupa-check-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "homupa-check",
            storageBucket: "homupa-check.firebasestorage.app",
            messagingSenderId: "190974280049",
            appId: "1:190974280049:web:c5dcb3111a70d5cc32f6d0"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        console.log('✅ HomuPa! Check - 修正対応画面起動 (Firebase対応)');

        let projectData = null;
        let currentPageId = null;
        let currentFilter = 'all';

        // 関数をグローバルスコープに公開
        window.switchPage = switchPage;
        window.filterComments = filterComments;
        window.toggleComplete = toggleComplete;
        window.highlightPin = highlightPin;

        function getProjectId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('project');
        }

        async function autoSave() {
            if (projectData) {
                try {
                    await update(ref(database, 'projects/' + projectData.projectId), projectData);
                    console.log('💾 Firebase保存完了');
                } catch (e) {
                    console.error('❌ Firebase保存エラー:', e);
                }
            }
        }

        window.onload = async function() {
            console.log('=== 修正対応画面読み込み開始 ===');
            
            const projectId = getProjectId();
            console.log('プロジェクトID:', projectId);
            
            if (!projectId) {
                alert('プロジェクトIDが見つかりません。URLを確認してください。');
                return;
            }

            try {
                const snapshot = await get(ref(database, 'projects/' + projectId));
                
                if (snapshot.exists()) {
                    projectData = snapshot.val();
                    console.log('✅ Firebaseからデータ読み込み成功');
                    console.log('ページ数:', projectData.pages?.length || 0);
                } else {
                    console.error('❌ プロジェクトデータが見つかりません');
                    alert('プロジェクトデータが見つかりません。\n制作者画面で「共有URL作成」を実行してください。');
                    return;
                }
            } catch (e) {
                console.error('❌ Firebase読み込みエラー:', e);
                alert('データの読み込みに失敗しました');
                return;
            }

            if (projectData.pages && projectData.pages.length > 0) {
                currentPageId = projectData.pages[0].id;
                console.log('✅ レンダリング開始');
                render();
            } else {
                console.error('❌ ページデータがありません');
                alert('ページデータがありません');
            }
        };

        function render() {
            renderPageTabs();
            renderCommentList();
            renderScreenshot();
            updateProgress();
        }

        function renderPageTabs() {
            const container = document.getElementById('pageTabs');
            
            const html = projectData.pages.map(page => {
                const completedCount = page.comments.filter(c => c.completed).length;
                const totalCount = page.comments.length;
                
                return `
                <button 
                    onclick="switchPage('${page.id}')"
                    class="page-tab w-full text-left p-3 rounded-lg mb-2 ${page.id === currentPageId ? 'active' : 'bg-gray-50 hover:bg-gray-100'}"
                >
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-semibold text-sm truncate flex-1">
                            ${page.name}
                        </span>
                        <span class="text-xs px-2 py-1 rounded ${page.id === currentPageId ? 'bg-white bg-opacity-30' : 'bg-blue-100 text-blue-700'}">
                            ${page.mode === 'desktop' ? '💻 PC' : '📱 スマホ'}
                        </span>
                    </div>
                    <div class="flex items-center gap-2 text-xs ${page.id === currentPageId ? 'text-white opacity-80' : 'text-gray-500'}">
                        <span>${completedCount}/${totalCount} 完了</span>
                    </div>
                </button>
            `}).join('');
            
            container.innerHTML = html;
        }

        function switchPage(pageId) {
            currentPageId = pageId;
            render();
        }

        function filterComments(filter) {
            currentFilter = filter;
            
            // すべてのボタンをリセット
            document.getElementById('btnAll').style.backgroundColor = 'white';
            document.getElementById('btnAll').style.border = '2px solid #000';
            document.getElementById('btnAll').style.color = '#000';
            
            document.getElementById('btnPending').style.backgroundColor = 'white';
            document.getElementById('btnPending').style.border = '2px solid #000';
            document.getElementById('btnPending').style.color = '#000';
            
            document.getElementById('btnCompleted').style.backgroundColor = 'white';
            document.getElementById('btnCompleted').style.border = '2px solid #000';
            document.getElementById('btnCompleted').style.color = '#000';
            
            // 選択されたボタンのスタイル
            if (filter === 'all') {
                document.getElementById('btnAll').style.backgroundColor = '#C8E6C9';
                document.getElementById('btnAll').style.color = '#2E7D32';
                document.getElementById('btnAll').style.border = 'none';
            } else if (filter === 'pending') {
                document.getElementById('btnPending').style.backgroundColor = '#000';
                document.getElementById('btnPending').style.color = 'white';
            } else {
                document.getElementById('btnCompleted').style.backgroundColor = '#000';
                document.getElementById('btnCompleted').style.color = 'white';
            }
            
            renderCommentList();
        }

        function renderCommentList() {
            const container = document.getElementById('commentList');
            const page = projectData.pages.find(p => p.id === currentPageId);

            if (!page) return;

            let comments = page.comments || [];

            if (currentFilter === 'pending') {
                comments = comments.filter(c => !c.completed);
            } else if (currentFilter === 'completed') {
                comments = comments.filter(c => c.completed);
            }

            if (comments.length === 0) {
                container.innerHTML = `
                    <div class="p-8 text-center text-gray-400">
                        <svg class="mx-auto mb-3 text-gray-300" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p class="text-sm">該当する修正指示がありません</p>
                    </div>
                `;
                return;
            }

            const allComments = page.comments || [];

            container.innerHTML = comments.map((comment) => {
                const index = allComments.findIndex(c => c.id === comment.id);
                return `
                <div class="comment-item p-4 cursor-pointer mb-2 rounded-lg ${comment.completed ? 'completed' : ''}" onclick="highlightPin('${comment.id}')">
                    <div class="flex items-start gap-3">
                        <input 
                            type="checkbox" 
                            class="checkbox-custom mt-1 flex-shrink-0"
                            ${comment.completed ? 'checked' : ''}
                            onclick="event.stopPropagation(); toggleComplete('${comment.id}')"
                        >
                        <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background-color: ${comment.completed ? 'var(--homupa-green)' : 'linear-gradient(135deg, #ff3a56 0%, #0daeec 100%)'};">
                            ${index + 1}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm text-gray-800 leading-relaxed mb-2 ${comment.completed ? 'line-through' : ''}">
                                ${comment.comment || '(画像/音声のみ)'}
                            </p>
                            <div class="text-xs text-gray-500">
                                位置: ${comment.x.toFixed(1)}%, ${comment.y.toFixed(1)}%
                            </div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function toggleComplete(commentId) {
            const page = projectData.pages.find(p => p.id === currentPageId);
            if (!page) return;

            const comment = page.comments.find(c => c.id === commentId);
            
            if (comment) {
                comment.completed = !comment.completed;
                autoSave();
                render();
            }
        }

        function renderScreenshot() {
            const page = projectData.pages.find(p => p.id === currentPageId);
            const container = document.getElementById('screenshotDisplay');

            console.log('🖼️ renderScreenshot 実行');
            console.log('currentPageId:', currentPageId);
            console.log('page:', page);
            
            if (!page) {
                console.error('❌ ページが見つかりません');
                container.innerHTML = `
                    <div class="text-center py-20 text-gray-400">
                        <p>ページが見つかりません</p>
                        <p class="text-sm mt-2">currentPageId: ${currentPageId}</p>
                    </div>
                `;
                return;
            }

            console.log('page.screenshot exists:', !!page.screenshot);
            console.log('page.screenshot length:', page.screenshot ? page.screenshot.length : 0);

            const maxWidth = page.mode === 'desktop' ? '1200px' : '400px';

            container.innerHTML = `
                <div style="position: relative; display: inline-block; max-width: ${maxWidth}; margin: 0 auto;">
                    <img 
                        id="mainScreenshot"
                        src="${page.screenshot || ''}" 
                        alt="${page.name}"
                        style="width: 100%; display: block; border: 2px solid #ddd; border-radius: 8px;"
                        onerror="console.error('❌ 画像の読み込みに失敗しました'); this.style.display='none'; this.parentElement.innerHTML='<p class=text-center>画像の読み込みに失敗しました</p>';"
                    >
                    <div id="pinsContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></div>
                </div>
            `;

            const img = document.getElementById('mainScreenshot');
            if (img.complete) {
                console.log('✅ 画像読み込み完了（キャッシュ）');
                renderPins();
            } else {
                img.onload = () => {
                    console.log('✅ 画像読み込み完了');
                    renderPins();
                };
            }
        }

        function renderPins() {
            const container = document.getElementById('pinsContainer');
            const page = projectData.pages.find(p => p.id === currentPageId);

            if (!container) return;
            container.innerHTML = '';

            if (!page) return;

            const comments = page.comments || [];

            comments.forEach((comment, index) => {
                const pinElement = document.createElement('div');
                pinElement.id = `pin-${comment.id}`;
                pinElement.className = `pin-marker absolute transform -translate-x-1/2 -translate-y-full pointer-events-auto ${comment.completed ? 'completed' : ''}`;
                pinElement.style.left = comment.x + '%';
                pinElement.style.top = comment.y + '%';

                const pinColor = comment.completed ? 'var(--homupa-green)' : '#ff3a56';

                pinElement.innerHTML = `
                    <div class="relative">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="${pinColor}" stroke="${pinColor}" stroke-width="2" class="drop-shadow-lg">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3" fill="white"></circle>
                        </svg>
                        <div class="absolute top-1 left-1/2 transform -translate-x-1/2 text-white text-xs font-bold">
                            ${comment.completed ? '✓' : index + 1}
                        </div>
                    </div>
                    <div class="tooltip absolute top-full left-1/2 transform -translate-x-1/2 mt-2">
                        <div class="bg-white px-3 py-2 rounded-lg shadow-xl border border-gray-200 whitespace-nowrap max-w-xs">
                            <p class="text-sm text-gray-700 truncate ${comment.completed ? 'line-through' : ''}">
                                ${comment.comment || '(画像/音声)'}
                            </p>
                            <p class="text-xs mt-1" style="color: ${comment.completed ? 'var(--homupa-green)' : '#ff3a56'}">
                                ${comment.completed ? '✓ 対応済み' : '未対応'}
                            </p>
                        </div>
                    </div>
                `;

                pinElement.onclick = () => highlightPin(comment.id);

                container.appendChild(pinElement);
            });
        }

        function highlightPin(commentId) {
            document.querySelectorAll('.pin-marker').forEach(pin => {
                pin.style.transform = 'translateX(-50%) translateY(-100%)';
            });

            document.querySelectorAll('.comment-item').forEach(item => {
                item.classList.remove('active');
            });

            const pinElement = document.getElementById(`pin-${commentId}`);
            if (pinElement) {
                pinElement.style.transform = 'translateX(-50%) translateY(-100%) scale(1.3)';
                pinElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            const page = projectData.pages.find(p => p.id === currentPageId);
            if (page) {
                const comments = page.comments;
                const commentIndex = comments.findIndex(c => c.id === commentId);
                if (commentIndex !== -1) {
                    const commentItems = document.querySelectorAll('.comment-item');
                    const visibleIndex = Array.from(commentItems).findIndex(item => 
                        item.querySelector(`[onclick*="${commentId}"]`)
                    );
                    if (visibleIndex !== -1 && commentItems[visibleIndex]) {
                        commentItems[visibleIndex].classList.add('active');
                        commentItems[visibleIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }
            }
        }

        function updateProgress() {
            let totalComments = 0;
            let completedComments = 0;

            projectData.pages.forEach(page => {
                const comments = page.comments || [];
                totalComments += comments.length;
                completedComments += comments.filter(c => c.completed).length;
            });

            document.getElementById('totalComments').textContent = totalComments;
            document.getElementById('progressText').textContent = `${completedComments}/${totalComments}`;

            const progressPercent = totalComments > 0 ? (completedComments / totalComments * 100) : 0;
            document.getElementById('progressBar').style.width = progressPercent + '%';
        }
    </script>

</body>
</html>
